<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Details</title>
  <link rel="stylesheet" href="./styles/style.css" />
  <script src="https://kit.fontawesome.com/f300007e95.js" crossorigin="anonymous"></script>
  <script type="module" src="./scripts/script.js" defer></script>
</head>

<body>
  <header class="header">
    <div class="content-wrapper header__flex">
      <a href="index.html"><img class="header__logo" src="./res/logo.png" alt="logotype" /></a>
      <form class="header__form" id="searchForm">
        <input class="header__input" id="searchInput" type="text" aria-label="Search" />
        <button type="submit" class="header__form-btn" id="searchBtn"><i class="fas fa-search"></i><span class="search-text">Search</span></button>
      </form>
      <a href="./favorites.html" class="header__fav-btn" id="favBtn"><i class="fas fa-star"></i><span class="fav-text">Favorites</span></a>
    </div>
  </header>

  <section class="movie-details-page">
    <div class="content-wrapper movie-details-container" id="movieDetails"></div>
  </section>

  <footer class="footer">
    <div class="content-wrapper footer__flex">
      <p>© 2026 IMDO</p>
      <div class="footer__links">
        <a href="index.html">Home</a>
        <a href="favorites.html">Favorites</a>
      </div>
    </div>
  </footer>
</body>

</html>
